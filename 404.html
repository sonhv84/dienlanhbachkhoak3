<style>
    :root {
  --blue-dark: #1f3b5c;
  --blue-main: #0d2f4f;
  --teal: #27d3c3;
  --yellow: #f5b21a;
  --white: #ffffff;
  --shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, var(--blue-main), var(--blue-dark));
  color: var(--white);
  display: flex;
  flex-direction: column;
  font-family: "Roboto", sans-serif;
}

/* Tận dụng layout trung tâm */
.error-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.box {
  max-width: 700px;
  width: 100%;
  padding: 60px 40px;
  text-align: center;
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border-radius: 30px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.box h1 {
  font-size: clamp(80px, 15vw, 120px);
  font-weight: 900;
  color: var(--yellow);
  line-height: 1;
  margin-bottom: 10px;
  text-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
}

.box h2 {
  font-size: 26px;
  margin-bottom: 20px;
  color: var(--teal);
}

.box p {
  opacity: 0.8;
  margin-bottom: 40px;
  font-size: 16px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

/* Link nhanh dịch vụ (SEO Silo Recovery) */
.quick-links {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  margin-bottom: 40px;
}

.quick-links a {
  padding: 12px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  transition: all 0.3s ease;
  border: 1px solid transparent;
}

.quick-links a:hover {
  background: rgba(255, 255, 255, 0.2);
  border-color: var(--teal);
  transform: translateY(-3px);
}

/* Main Buttons */
.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

a.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 15px 35px;
  background: var(--yellow);
  color: #000;
  text-decoration: none;
  font-weight: 700;
  border-radius: 50px;
  transition: all 0.3s ease;
  box-shadow: 0 10px 20px rgba(245, 178, 26, 0.3);
}

a.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 15px 30px rgba(245, 178, 26, 0.5);
}

a.btn-outline {
  background: transparent;
  color: #fff;
  border: 2px solid var(--white);
}

@media (max-width: 480px) {
  .box {
    padding: 40px 20px;
  }
  .quick-links {
    grid-template-columns: 1fr 1fr;
  }
}

</style>

</head>
