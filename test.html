<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tạo mã QR</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: #f5f5f5;
        }
        input {
            padding: 10px;
            width: 250px;
        }
        button {
            padding: 10px 20px;
            margin-left: 10px;
            cursor: pointer;
        }
        #qrcode {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>Tạo mã QR</h2>

    <input type="text" id="text" placeholder="Nhập nội dung...">
    <button onclick="generateQR()">Tạo QR</button>

    <div id="qrcode"></div>

    <!-- Thư viện QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        function generateQR() {
            let text = document.getElementById("text").value;
            let qrDiv = document.getElementById("qrcode");

            qrDiv.innerHTML = ""; // xóa QR cũ

            new QRCode(qrDiv, {
                text: text,
                width: 200,
                height: 200
            });
        }
    </script>

</body>
</html>
